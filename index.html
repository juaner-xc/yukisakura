<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>我的日记</title>

<style>
/* ===== 背景图片 ===== */
body {
    font-family: -apple-system;
    max-width: 700px;
    margin: auto;
    padding: 20px;
    color: white;

    background: url("images/bg.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* 遮罩（防止看不清） */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* 标题 */
h1 {
    text-align: center;
}

/* 输入区域 */
.editor {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 15px;
    border-radius: 15px;
}

/* 输入框 */
textarea {
    width: 100%;
    height: 100px;
    border: none;
    border-radius: 10px;
    padding: 10px;
    outline: none;
}

/* 按钮 */
button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* 日期 */
.date {
    margin-top: 20px;
    font-weight: bold;
}

/* 日记卡片 */
.note {
    background: rgba(255,255,255,0.9);
    color: black;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    transition: 0.3s;
}

.note:hover {
    transform: translateY(-5px);
}

/* 时间 */
.time {
    font-size: 12px;
    color: gray;
}

/* 删除按钮 */
.delete {
    background: red;
    color: white;
    margin-top: 5px;
}
</style>

</head>

<body>

<h1>？？ 写点啥</h1>

<div class="editor">
    <textarea id="content" placeholder="今天发生了什么..."></textarea>
    <button onclick="addNote()">保存日记</button>
</div>

<div id="list"></div>

<script>
let notes = JSON.parse(localStorage.getItem("notes") || "[]");

// 日期
function getDate() {
    const d = new Date();
    return d.getFullYear() + "-" +
        String(d.getMonth()+1).padStart(2,'0') + "-" +
        String(d.getDate()).padStart(2,'0');
}

// 时间
function getTime() {
    return new Date().toLocaleTimeString();
}

// 添加
function addNote() {
    const text = document.getElementById("content").value;
    if (!text) return;

    notes.unshift({
        text,
        date: getDate(),
        time: getTime()
    });

    localStorage.setItem("notes", JSON.stringify(notes));
    document.getElementById("content").value = "";
    render();
}

// 删除
function deleteNote(index) {
    notes.splice(index, 1);
    localStorage.setItem("notes", JSON.stringify(notes));
    render();
}

// 渲染（按日期分组）
function render() {
    let html = "";
    let lastDate = "";

    notes.forEach((n, i) => {

        if (n.date !== lastDate) {
            html += `<div class="date">📅 ${n.date}</div>`;
            lastDate = n.date;
        }

        html += `
        <div class="note">
            <div class="time">${n.time}</div>
            <p>${n.text}</p>
            <button class="delete" onclick="deleteNote(${i})">删除</button>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

render();
</script>

</body>
</html>

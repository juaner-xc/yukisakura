<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的在线日记本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 编辑区样式 */
        .editor-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .editor-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input {
            margin-bottom: 15px;
        }
        
        textarea {
            min-height: 300px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        
        .tags-input {
            margin-bottom: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-right: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .delete-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        /* 日记列表样式 */
        .diary-list {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .diary-list h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .diary-item {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .diary-item:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }
        
        .diary-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .diary-date {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .diary-tags {
            display: inline-block;
            background: #667eea20;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .diary-preview {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .empty {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        
        .button-group {
            margin-top: 20px;
        }
        
        .edit-mode {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 编辑区 -->
        <div class="editor-section">
            <h2>📝 写新日记 / 编辑</h2>
            <input type="text" id="title" placeholder="标题" autocomplete="off">
            <input type="text" id="tags" placeholder="标签（用逗号分隔，例如：生活,工作,想法）" autocomplete="off">
            <textarea id="content" placeholder="今天发生了什么...&#10;&#10;支持 Markdown 格式：&#10;# 标题&#10;**粗体**&#10;- 列表"></textarea>
            <div class="button-group">
                <button onclick="saveDiary()">💾 保存</button>
                <button onclick="clearForm()">🗑️ 清空</button>
                <button id="deleteBtn" class="delete-btn" onclick="deleteCurrent()" style="display:none;">⚠️ 删除当前</button>
            </div>
        </div>
        
        <!-- 日记列表 -->
        <div class="diary-list">
            <h2>📚 我的日记本</h2>
            <div id="diaryList"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let currentId = null;  // 当前正在编辑的日记ID
        
        // 加载所有日记
        function loadDiaries() {
            const diaries = JSON.parse(localStorage.getItem('diaries') || '[]');
            const diaryList = document.getElementById('diaryList');
            
            if (diaries.length === 0) {
                diaryList.innerHTML = '<div class="empty">✨ 还没有日记，写第一篇吧！</div>';
                return;
            }
            
            // 按日期倒序排列（最新的在前面）
            diaries.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            diaryList.innerHTML = diaries.map(diary => `
                <div class="diary-item" onclick="editDiary(${diary.id})">
                    <div class="diary-title">${escapeHtml(diary.title)}</div>
                    <div class="diary-date">📅 ${diary.date}</div>
                    <div>
                        ${diary.tags.map(tag => `<span class="diary-tags">#${escapeHtml(tag)}</span>`).join('')}
                    </div>
                    <div class="diary-preview">${escapeHtml(diary.content.substring(0, 100))}...</div>
                </div>
            `).join('');
        }
        
        // 保存日记
        function saveDiary() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const tagsText = document.getElementById('tags').value.trim();
            
            if (!title) {
                alert('请填写标题');
                return;
            }
            
            if (!content) {
                alert('请填写内容');
                return;
            }
            
            const tags = tagsText ? tagsText.split(',').map(t => t.trim()) : [];
            const diaries = JSON.parse(localStorage.getItem('diaries') || '[]');
            
            if (currentId) {
                // 更新现有日记
                const index = diaries.findIndex(d => d.id === currentId);
                if (index !== -1) {
                    diaries[index] = {
                        ...diaries[index],
                        title: title,
                        content: content,
                        tags: tags,
                        updateDate: new Date().toISOString().slice(0, 10)
                    };
                }
                alert('✅ 更新成功！');
                currentId = null;
                document.getElementById('deleteBtn').style.display = 'none';
            } else {
                // 新建日记
                const newDiary = {
                    id: Date.now(),
                    title: title,
                    content: content,
                    tags: tags,
                    date: new Date().toISOString().slice(0, 10),
                    updateDate: new Date().toISOString().slice(0, 10)
                };
                diaries.push(newDiary);
                alert('✅ 保存成功！');
            }
            
            localStorage.setItem('diaries', JSON.stringify(diaries));
            clearForm();
            loadDiaries();
        }
        
        // 编辑日记
        function editDiary(id) {
            const diaries = JSON.parse(localStorage.getItem('diaries') || '[]');
            const diary = diaries.find(d => d.id === id);
            
            if (diary) {
                document.getElementById('title').value = diary.title;
                document.getElementById('content').value = diary.content;
                document.getElementById('tags').value = diary.tags.join(', ');
                currentId = diary.id;
                document.getElementById('deleteBtn').style.display = 'inline-block';
                
                // 滚动到编辑区
                document.querySelector('.editor-section').scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        // 删除当前编辑的日记
        function deleteCurrent() {
            if (!currentId) return;
            
            if (confirm('确定要删除这篇日记吗？')) {
                let diaries = JSON.parse(localStorage.getItem('diaries') || '[]');
                diaries = diaries.filter(d => d.id !== currentId);
                localStorage.setItem('diaries', JSON.stringify(diaries));
                alert('🗑️ 已删除');
                clearForm();
                loadDiaries();
                currentId = null;
                document.getElementById('deleteBtn').style.display = 'none';
            }
        }
        
        // 清空表单
        function clearForm() {
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('tags').value = '';
            currentId = null;
            document.getElementById('deleteBtn').style.display = 'none';
        }
        
        // 防止 XSS 攻击
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始化加载
        loadDiaries();
        
        // 可选：实时预览功能（如果需要可以取消注释）
        // 这里没有做实时预览，保持简洁
    </script>
</body>
</html>
